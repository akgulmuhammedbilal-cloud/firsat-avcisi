# AI Premium Laptop Fırsat Avcısı — yerel yapılandırma.
# Sırlar burada DEĞİL .env içinde tutulur.

polling:
  interval_seconds: 120

ai:
  provider: gemini             # gemini | dryrun
  model: gemini-2.5-flash-lite
  temperature: 0.1
  timeout_seconds: 60

storage:
  database_path: deals.db

digest:
  period_hours: 24             # Günlük özetin kapsadığı saat aralığı

sources:
  # Her blok bir kaynaktır: {enabled, type(varsayılan rss), feeds, request_timeout_seconds}.
  # Yeni bir RSS kaynağı eklemek için yeni bir blok eklemen yeterli — kod gerekmez.
  mydealz:
    enabled: true
    feeds:
      - "https://www.mydealz.de/rss/gruppe/laptop"
      # --- KİŞİSEL KEYWORD ALARM RSS'LERİ ---
      # MyDealz hesabında "Schlagwort-Alarme" (keyword alarmları) oluştur, RSS
      # linklerini buraya ekle. Grup feed'iyle aynı kaynak altında oldukları için
      # mükerrer ilanlar otomatik tekilleşir. Örnek (kendi URL'lerinle değiştir):
      # - "https://www.mydealz.de/rss/schlagwort-alarm/XXXXXXXX"
      # - "https://www.mydealz.de/rss/schlagwort-alarm/YYYYYYYY"
    request_timeout_seconds: 20

  # Preisjäger: MyDealz'in Avusturya kardeş sitesi (aynı format, ek kapsam, EUR).
  preisjaeger:
    enabled: true
    feeds:
      - "https://www.preisjaeger.at/rss/gruppe/laptop"
    request_timeout_seconds: 20

  # Geizhals (Apify ile): proxy+tarayıcı gerektirir. Apify'da actor'ü kurup
  # ZAMANLI çalıştır; biz son başarılı run'ın dataset'ini okuruz (ucuz).
  # Hazır olunca enabled: true yap, apify_resource'u kendi task/actor ID'inle doldur
  # ve APIFY_TOKEN secret'ını ekle. Alan adları Apify çıktına göre fields'ta eşlenir.
  geizhals:
    enabled: false
    type: apify
    apify_resource: "actor-tasks/SENIN_TASK_ID"   # veya "acts/KULLANICI~web-scraper"
    fields:
      title: "title"
      url: "url"
      price: "price"
    limit: 200
    request_timeout_seconds: 60

filters:
  min_gpu: "RTX 4060"
  min_ram_gb: 32
  allow_16gb_if_upgradeable: true
  min_deal_score: 55
  min_price: 700
  max_price: 3000

reject_keywords:
  - "Asus TUF"
  - "HP Victus"
  - "Acer Nitro"
  - "MSI Thin"
  - "MSI GF"
  - "MSI Cyborg"
  - "RTX 4050"
  - "RTX 3050"
  - "8GB RAM"
  - "8 GB RAM"

preferred_models:
  - "ROG Zephyrus"
  - "ROG Flow"
  - "Legion Slim 7"
  - "Legion 7"
  - "Legion Pro"
  - "Yoga Pro"
  - "XPS 15"
  - "XPS 16"
  - "Precision"
  - "ZBook"
  - "Razer Blade"
  - "Stealth"
  - "Creator"
  - "XMG"
  - "Schenker"
